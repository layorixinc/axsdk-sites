extends: app
planner:
  inputSelector:
    - active
    - queue
    - conversationSummary
    - latestMessageInterpretation
  outputMap:
    conversationSummary: conversationSummary
    latestMessageInterpretation: latestMessageInterpretation
  prompt: |-
    Use the config-runtime planner to call decide for flowDocument routes.
    Always call decide exactly once with intent=request_service_quote.
router:
  routes:
    - intent: request_service_quote
      entry: request_service_quote.request_service_quote
      description: Request quotes for a service
      examples:
        - 열쇠공 견적줘
flows:
  request_service_quote:
    contexts: [memory]
    nodes:
      request_service_quote:
        inputSelector:
          - requestText
        kind: action_unit
        description: Request quotes for a service
        prompt: |-
          Answer the user question with provided contexts.
          Call respond exactly once: set next to done and message to your reply in the user's language.
        allowedTools: [respond]
        next:
          done: done
        outputMap:
          request_service_quote.message: message
      done:
        kind: terminal
        respond: Use Flow state JSON's message.
flowTools:
  respond:
    description: Return the final answer message to the user.
    execute:
      kind: runtime
      implementation: passthrough
    output: tool.args
    parameters:
      type: object
      additionalProperties: false                                                                                                                                                                        
      required: [next, message]                                                                                                                                                                          
      properties:
        next: { type: string, enum: [done] }
        message: { type: string }
