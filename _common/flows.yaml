extends: app
app:                                                                                                                                                                                                     
  terminal:
    llm: { maxOutputTokens: 2048 }
    prompt: |-
      Rewrite the terminal browser-extension response in the latest user's language.
      Return only the final user-facing response text. Do not invent facts, links, or results.
      Preserve navigation, selection, submission, not-found, and cancellation meaning.
      If the base response asks to use Flow state JSON's message, return the non-empty message only.
      If the base response asks to use Flow state JSON's question, return the non-empty question only.
      If the base response asks to return the search results as JSON, output ONLY a compact JSON object
      with keys query, zip_code, total_count, and candidates — copy candidates verbatim from the Flow
      state JSON (do not summarize, reorder, or drop fields). No prose, no markdown fences.
planner:
  inputSelector:
    - active
    - queue
    - conversationSummary
    - latestMessageInterpretation
  outputMap:
    conversationSummary: conversationSummary
    latestMessageInterpretation: latestMessageInterpretation
  prompt: |-
    You orchestrate the request_service_quote flow. Call decide exactly once.
    - If an active request_service_quote flow is awaiting the user's answer (an active flow / active prompt exists), call decide with action=continue_current and the latest user message. Do NOT restart the flow.
    - Otherwise, for a new service-quote request, call decide with action=replace_current and intent=request_service_quote.
router:
  mode: fixed
  defaultIntent: request_service_quote
  routes:
    - intent: request_service_quote
      entry: request_service_quote.collect_request
      description: Request quotes from Thumbtack service professionals.
      examples:
        - 열쇠공 견적줘
        - 샌프란시스코 핸디맨 견적 받아줘
        - get a house cleaning quote in San Francisco
flows:
  request_service_quote:
    goal: Collect a service-quote request (service, requirements, ZIP), search Thumbtack, and return the matching pros as JSON.
    contexts: [memory]
    inputSelector:
      - requestText
    state:
      service_query: null
      user_requirements: null
      address: null
      zip_code: null
      zip_status: null
      query: null
      candidates: null
      total_count: null
      service_options: null
      search_status: null
    nodes:
      collect_request:
        kind: action_unit
        description: Fill the request fields from the user message and memory; ask for anything missing; resolve a ZIP from an address when needed.
        model:
          providerID: openrouter
          modelID: minimax/minimax-m3
          providerOptions:
            openrouter:
              provider: { sort: latency, allow_fallbacks: false }
              reasoning: { effort: high }
        inputSelector:
          - requestText
          - service_query
          - user_requirements
          - address
          - zip_code
          - zip_status
        allowedTools: [collect_fields]
        prompt: |-
          You collect the details needed for a service-quote request. Fill the empty fields from the latest user message (requestText) and the <memory> context. Use the projected state fields as the current values; treat null, empty strings, and empty arrays as missing.

          Fields:
          - service_query: the service to search for (e.g. "house cleaning", "handyman"). Extract from requestText when concrete.
          - user_requirements: what the user wants done and when (scope / details / timing).
          - address: a service address or city/state, when the user or memory provides one. Used only to derive a ZIP; not a required final field by itself. Normalize it to an English "City, ST" form (e.g., "San Francisco, CA") so the ZIP can be resolved.
          - zip_code: a US ZIP code for the search.

          Use the <memory> context as user-provided data: use a single unambiguous value; prefer the latest user message over memory; on conflicting memory values, ask the user to choose instead of guessing.

          Call collect_fields exactly once, always re-emitting every field you already know (service_query, user_requirements, address, zip_code) so accumulated values persist. Choose next:
          - next=ask — when you need the user to supply a missing or ambiguous detail. You MUST also set a non-empty `question` with the exact question to show the user, in their language. Ask when:
            - service_query or user_requirements is missing or ambiguous; or
            - zip_code is missing AND address is also missing (ask for the service address or US ZIP code); or
            - zip_code is still missing after a resolve attempt (zip_status is non-empty, e.g. "zip_not_found" or an error) — ask for a valid US ZIP code or a more specific address; when the user gives a new address or ZIP, set address/zip_code and reset zip_status to empty.
          - next=resolve — when zip_code is missing, address is present, and zip_status is empty (you have not resolved yet). resolve_zip derives the ZIP from the address and sets zip_status itself — you do not set zip_status.
          - next=done — when service_query, user_requirements, and zip_code are ALL present. The flow then searches Thumbtack for matching pros; you do not need to write a confirmation message.

          Never set next=ask without a non-empty question.
        next:
          ask: collect_request
          resolve: resolve_location
          done: search
          error: error
        fallback: { invalidNext: error, exhaustedNext: error }

      resolve_location:
        kind: action_unit
        description: Resolve a US ZIP code from the collected address, then return to collect_request.
        inputSelector:
          - address
        allowedTools: [resolve_zip]
        prompt: |-
          Call resolve_zip exactly once with the collected address to derive a US ZIP code.
        next:
          collect: collect_request
          error: error
        fallback: { invalidNext: collect, exhaustedNext: error }

      search:
        kind: action_unit
        description: Search Thumbtack for the collected service in the resolved ZIP.
        model:
          providerID: openrouter
          modelID: minimax/minimax-m3
          providerOptions:
            openrouter:
              provider: { sort: latency, allow_fallbacks: false }
              reasoning: { effort: high }
        inputSelector:
          - service_query
          - zip_code
          - address
        allowedTools: [search_service]
        llm: { maxCalls: 5 }
        prompt: |-
          Call search_service with `query` = the collected service_query (e.g. "house cleaning",
          "handyman") and `zip_code` = the collected zip_code (copy the resolved ZIP from the
          projected state). Do not set any other field.

          search_service is two-phase. The first call fires the search and may return
          status="navigating" while the results page is still loading. Whenever the result is
          status="navigating", call search_service AGAIN with the SAME query and zip_code to wait
          for and read the now-loaded results. Repeat until status="completed" (results were read)
          or status="error". Never stop while the status is "navigating".
        next:
          read: results
          done: results
          error: error
        fallback: { invalidNext: error, exhaustedNext: error }

      results:
        kind: terminal
        respond: Return the search results as JSON.

      error:
        kind: terminal
        respond: 견적 요청에 필요한 정보를 수집하지 못했습니다. 다시 시도해 주세요.
flowTools:
  collect_fields:
    description: Fill the collected request fields and choose the next step (ask the user, resolve a ZIP, or finish).
    execute:
      kind: runtime
      implementation: passthrough
    output: tool.args
    parameters:
      type: object
      additionalProperties: true
      required: [next]
      properties:
        next: { type: string, enum: [ask, resolve, done] }
        question: { type: string }
        service_query: { type: string }
        user_requirements: { type: string }
        address: { type: string }
        zip_code: { type: string }
        zip_status: { type: string }
        message: { type: string }

  resolve_zip:
    description: Resolve a US ZIP code from an address string.
    execute: { kind: remote, tool: AX_resolve_zip }
    input:
      address: tool.args.address
    output:
      next: collect
      zip_code: result.zip_code
      zip_source: result.source
      zip_status: { if: [{ var: result.zip_code }, { var: result.status }, "resolve_failed"] }
      error: result.error
    parameters:
      type: object
      additionalProperties: false
      required: [address]
      properties:
        address: { type: string }

  search_service:
    description: Search Thumbtack for local pros matching the service query in the resolved ZIP.
    execute: { kind: remote, tool: AX_search_service, timeoutMs: 90000 }
    input:
      query: tool.args.query
      zip_code: tool.args.zip_code
    output:
      next: { if: [{ "==": [{ var: result.status }, "completed"] }, "done", { var: result.error }, "error", "read"] }
      query: result.query
      zip_code: result.zip_code
      search_status: result.status
      candidates: result.candidates
      total_count: result.total_count
      service_options: result.service_options
      error: result.error
    parameters:
      type: object
      additionalProperties: false
      required: [query, zip_code]
      properties:
        query: { type: string }
        zip_code: { type: string }
