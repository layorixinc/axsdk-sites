extends: app
app:                                                                                                                                                                                                     
  terminal:
    llm: { maxOutputTokens: 2048 }
    prompt: |-
      Rewrite the terminal browser-extension response in the latest user's language.
      Return only the final user-facing response text. Do not invent facts, links, or results.
      Preserve navigation, selection, submission, not-found, and cancellation meaning.
      If the base response asks to use Flow state JSON's message, return the non-empty message only.
      If the base response asks to use Flow state JSON's question, return the non-empty question only.
      If the base response asks to return the search results as JSON, output ONLY a compact JSON object
      with keys query, zip_code, total_count, and candidates — copy candidates verbatim from the Flow
      state JSON (do not summarize, reorder, or drop fields). No prose, no markdown fences.
planner:
  inputSelector:
    - active
    - queue
    - conversationSummary
    - latestMessageInterpretation
  outputMap:
    conversationSummary: conversationSummary
    latestMessageInterpretation: latestMessageInterpretation
  prompt: |-
    You orchestrate the request_service_quote flow. Call decide exactly once.
    - If an active request_service_quote flow is awaiting the user's answer (an active flow / active prompt exists), call decide with action=continue_current and the latest user message. Do NOT restart the flow.
    - Otherwise, for a new service-quote request, call decide with action=replace_current and intent=request_service_quote.
router:
  mode: fixed
  defaultIntent: request_service_quote
  routes:
    - intent: request_service_quote
      entry: request_service_quote.collect_request
      description: Request quotes from Thumbtack service professionals.
      examples:
        - 열쇠공 견적줘
        - 샌프란시스코 핸디맨 견적 받아줘
        - get a house cleaning quote in San Francisco
flows:
  request_service_quote:
    goal: Collect a service-quote request (service, requirements, ZIP), search Thumbtack, and return the matching pros as JSON.
    contexts: [memory]
    inputSelector:
      - requestText
    state:
      service_query: null
      user_requirements: null
      address: null
      zip_code: null
      zip_status: null
      query: null
      candidates: null
      total_count: null
      service_options: null
      search_status: null
      quote_status: null
      quote_service_id: null
      quote_index: null
      quote_url: null
      quote_target_service_id: null
    nodes:
      collect_request:
        kind: action_unit
        description: Fill the request fields from the user message and memory; ask for anything missing; resolve a ZIP from an address when needed.
        model:
          providerID: openrouter
          modelID: z-ai/glm-5.2
          providerOptions:
            openrouter:
              provider: { sort: latency, allow_fallbacks: true }
              reasoning: { effort: medium }
        inputSelector:
          - requestText
          - service_query
          - user_requirements
          - address
          - zip_code
          - zip_status
        allowedTools: [collect_fields, resolve_zip]
        prompt: |-
          Collect a service-quote request, then finish. The current values are the projected state fields; ALSO extract values from the latest user message (requestText) and <memory>. A field is MISSING only if it is absent from the message, memory, AND state. ENGLISH only — translate the service ("청소" -> "house cleaning", "핸디맨" -> "handyman", "잔디 깎기" -> "lawn mowing") and the city ("샌프란시스코" -> "San Francisco, CA").

          Two tools:
          - resolve_zip(address): turns an ENGLISH US city/address into a zip_code (sets zip_code, zip_status). Use it to obtain a zip; never guess one. "resolve" is NOT a next value.
          - collect_fields(next, question?, service_query?, user_requirements?, address?, zip_code?): re-emit fields you know, OMIT unknown ones (never null). next is "ask" or "done" ONLY; "ask" needs a `question` in the user's language.

          Make ONE tool call — the FIRST rule that applies (a city is NOT a zip_code; you cannot finish with only a city):
          - service_query unknown -> collect_fields next="ask" (ask which service). If the message names the service, it is known — skip this.
          - user_requirements unknown -> collect_fields next="ask" (ask what and when).
          - zip_code unknown AND address unknown -> collect_fields next="ask" (ask for the address or US ZIP code).
          - zip_code unknown AND address known AND zip_status empty -> resolve_zip(ENGLISH address). Do NOT ask; do NOT finish.
          - zip_code unknown AND zip_status set (a resolve already failed) -> collect_fields next="ask" (ask for a valid US ZIP or a more specific English address).
          - zip_code known (5-digit) -> collect_fields next="done".
        next:
          ask: collect_request
          collect: collect_request
          done: search
          error: error
        fallback: { invalidNext: error, exhaustedNext: error }

      search:
        kind: action_unit
        description: Search Thumbtack for the collected service in the resolved ZIP.
        model:
          providerID: openrouter
          modelID: z-ai/glm-5.2
          providerOptions:
            openrouter:
              provider: { sort: latency, allow_fallbacks: true }
              reasoning: { effort: medium }
        inputSelector:
          - service_query
          - zip_code
          - address
        allowedTools: [search_service]
        llm: { maxCalls: 8 }
        prompt: |-
          Call search_service with `query` = the collected service_query (e.g. "house cleaning",
          "handyman") and `zip_code` = the collected zip_code (copy the resolved ZIP from the
          projected state). Do not set any other field.

          search_service is two-phase. The first call fires the search and may return
          status="navigating" while the results page is still loading. Whenever the result is
          status="navigating", call search_service AGAIN with the SAME query and zip_code to wait
          for and read the now-loaded results. Repeat until status="completed" (results were read)
          or status="error". Never stop while the status is "navigating".
        next:
          read: results
          done: pick_quote
          error: error
        fallback: { invalidNext: error, exhaustedNext: error }

      pick_quote:
        kind: action_contract
        id: pick_quote
        description: Deterministically pick the next candidate pro and advance quote_index (no LLM, no navigation).
        next:
          open: open_quote
          done: quotes_done
        fallback: { invalidNext: done, exhaustedNext: done }

      open_quote:
        kind: action_contract
        id: open_quote
        description: Navigate to the picked pro and open its "Request estimate" dialog (never submits).
        next:
          open: pick_quote
          error: pick_quote
        fallback: { invalidNext: error, exhaustedNext: error }

      quotes_done:
        kind: terminal
        respond: Return the search results as JSON, plus a short note that the request-quote flow was opened for each candidate (none were submitted).

      results:
        kind: terminal
        respond: Return the search results as JSON.

      error:
        kind: terminal
        respond: 견적 요청에 필요한 정보를 수집하지 못했습니다. 다시 시도해 주세요.
flowTools:
  collect_fields:
    description: Fill the collected request fields and choose the next step (ask the user or finish).
    execute:
      kind: runtime
      implementation: passthrough
    output: tool.args
    parameters:
      type: object
      additionalProperties: true
      required: [next]
      properties:
        next: { type: string, enum: [ask, done] }
        question: { type: string }
        service_query: { type: string }
        user_requirements: { type: string }
        address: { type: string }
        zip_code: { type: string }
        zip_status: { type: string }
        message: { type: string }

  resolve_zip:
    description: Resolve a US ZIP code from an address string.
    execute: { kind: remote, tool: AX_resolve_zip }
    input:
      address: tool.args.address
    output:
      next: { if: [{ var: result.zip_code }, "collect", "ask"] }
      zip_code: result.zip_code
      zip_source: result.source
      zip_status: { if: [{ var: result.zip_code }, { var: result.status }, "resolve_failed"] }
      error: result.error
    parameters:
      type: object
      additionalProperties: false
      required: [address]
      properties:
        address: { type: string }

  search_service:
    description: Search Thumbtack for local pros matching the service query in the resolved ZIP.
    execute: { kind: remote, tool: AX_search_service, timeoutMs: 90000 }
    input:
      query: tool.args.query
      zip_code: tool.args.zip_code
    output:
      next: { if: [{ "==": [{ var: result.status }, "completed"] }, "done", { var: result.error }, "error", "read"] }
      query: result.query
      zip_code: result.zip_code
      search_status: result.status
      candidates: result.candidates
      total_count: result.total_count
      service_options: result.service_options
      error: result.error
    parameters:
      type: object
      additionalProperties: false
      required: [query, zip_code]
      properties:
        query: { type: string }
        zip_code: { type: string }

  pick_quote:
    description: Deterministically pick the next candidate pro to open and advance quote_index. No LLM, no navigation.
    execute:
      kind: runtime
      implementation: lua
      lua: |
        -- args.candidates / args.quote_index are projected from flow state (action_contract).
        local cands = args.candidates or {}
        local idx = args.quote_index or 0   -- count of pros already opened (0-based)
        local MAX_OPEN = 3                   -- cap per turn to stay within the ~12-step budget
        local limit = #cands
        if limit > MAX_OPEN then limit = MAX_OPEN end
        if idx < limit then
          local c = cands[idx + 1] or {}     -- Lua is 1-based; cands[idx+1] is the next unopened pro
          return {
            next = "open",
            quote_url = c.url,
            quote_target_service_id = c.service_id,
            quote_index = idx + 1,
          }
        end
        return { next = "done", quote_index = idx }
    parameters:
      type: object
      additionalProperties: true
      properties:
        candidates: { type: array }
        quote_index: { type: [integer, "null"] }

  open_quote:
    description: Navigate to the picked pro and open its "Request estimate" dialog. Never submits or sends.
    execute: { kind: remote, tool: AX_open_quote, timeoutMs: 60000 }
    input:
      url: tool.args.quote_url
      service_id: tool.args.quote_target_service_id
    output:
      next: { if: [{ var: result.error }, "error", "open"] }
      quote_status: result.status
      quote_service_id: result.service_id
      quote_error: result.error
    parameters:
      type: object
      additionalProperties: true
      properties:
        quote_url: { type: string }
        quote_target_service_id: { type: [string, "null"] }
