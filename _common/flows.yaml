extends: app
defaults:
  maxSteps: 64
app:                                                                                                                                                                                                     
  terminal:
    llm: { maxOutputTokens: 2048 }
    prompt: |-
      Rewrite the terminal browser-extension response in the latest user's language.
      Return only the final user-facing response text. Do not invent facts, links, or results.
      Preserve navigation, selection, submission, not-found, and cancellation meaning.
      If the base response asks to use Flow state JSON's message, return the non-empty message only.
      If the base response asks to use Flow state JSON's question, return the non-empty question only.
planner:
  inputSelector:
    - active
    - queue
    - conversationSummary
    - latestMessageInterpretation
  outputMap:
    conversationSummary: conversationSummary
    latestMessageInterpretation: latestMessageInterpretation
  prompt: |-
    You route the latest user message to a flow. Call decide exactly once.
    - If an active flow is awaiting the user's answer (an active flow / active prompt exists), call decide with action=continue_current and the latest user message. Do NOT restart or switch flows.
    - Otherwise classify the NEW request and call decide with action=replace_current and the matching intent:
      - intent=shopping — the user wants to find, buy, or order one or more products (e.g. "신발 사줘", "내가 아래 불러주는 물건 구매해줘", "buy airpods").
      - intent=request_service_quote — the user wants a quote/estimate for a local service (e.g. "핸디맨 견적", "house cleaning quote").
router:
  mode: fixed
  defaultIntent: request_service_quote
  routes:
    - intent: request_service_quote
      entry: request_service_quote.collect_request
      description: Request quotes from Thumbtack service professionals.
      examples:
        - 열쇠공 견적줘
        - 샌프란시스코 핸디맨 견적 받아줘
        - get a house cleaning quote in San Francisco
    - intent: shopping
      entry: shopping.collect_shopping
      description: Find, buy, or order one or more products (online shopping).
      examples:
        - 신발 사줘
        - 내가 아래 불러주는 물건 구매해줘
        - 아이팟 사줘
        - buy me some shoes
flows:
  request_service_quote:
    goal: Collect a service-quote request (service, requirements, ZIP/address, and the contact details the pros will use to reach the user — first name, last name, email, and phone — all collected up front; never proceed until every contact field is present), search Thumbtack, open quote requests for the top pros, then attempt the final Submit with the collected contact, and report each quote's outcome including the exact text of any Thumbtack validation/error popover.
    contexts: [memory]
    inputSelector:
      - requestText
    state:
      service_query: null
      site: thumbtack
      user_requirements: null
      address: null
      zip_code: null
      zip_status: null
      query: null
      candidates: null
      total_count: null
      service_options: null
      search_status: null
      quote_status: null
      quote_service_id: null
      quote_index: null
      quote_url: null
      quote_target_service_id: null
      quote_auto: true
      quote_answer_status: null
      quote_advance_reason: null
      quote_reached_submit: null
      quote_error: null
      quote_submit_status: null
      quote_submit_message: null
      quote_submit_error: null
      submit_phone: null
      submit_email: null
      submit_first_name: null
      submit_last_name: null
      quote_results: ""
      quote_count: null
    nodes:
      collect_request:
        kind: action_unit
        description: Fill the request fields from the user message and memory; ask for anything missing; resolve a ZIP from an address when needed.
        model:
          providerID: openrouter
          modelID: openai/gpt-5.4-mini
          providerOptions:
            openrouter:
              provider: { sort: latency, allow_fallbacks: true }
              reasoning: { effort: medium }
        inputSelector:
          - requestText
          - service_query
          - user_requirements
          - address
          - zip_code
          - zip_status
          - submit_phone
          - submit_email
          - submit_first_name
          - submit_last_name
        allowedTools: [collect_fields, resolve_zip]
        prompt: |-
          Collect a service-quote request, then finish. The current values are the projected state fields; ALSO extract values from the latest user message (requestText) and <memory>. A field is MISSING only if it is absent from the message, memory, AND state. ENGLISH only for the service and the city — translate the service ("청소" -> "house cleaning", "핸디맨" -> "handyman", "잔디 깎기" -> "lawn mowing") and the city ("샌프란시스코" -> "San Francisco, CA"). Keep the user's name and email exactly as written.

          To finish you MUST have ALL of: service_query, user_requirements, a 5-digit zip_code, AND the four contact fields the pros use to reach the user for the bulk quote requests — submit_first_name, submit_last_name, submit_email, submit_phone. NEVER invent or guess a contact field.

          Two tools:
          - resolve_zip(address): turns an ENGLISH US city/address into a zip_code (sets zip_code, zip_status). Use it to obtain a zip; never guess one. "resolve" is NOT a next value.
          - collect_fields(next, question?, service_query?, user_requirements?, address?, zip_code?, submit_phone?, submit_email?, submit_first_name?, submit_last_name?): ALWAYS re-emit EVERY field you already know (service_query, user_requirements, zip_code, AND every contact field you have) on every call — not just newly-learned ones — so a field collected earlier is never dropped. OMIT only fields that are still unknown (never pass null). next is "ask" or "done" ONLY; "ask" needs a `question` in the user's language.

          Make ONE tool call — the FIRST rule that applies (a city is NOT a zip_code; you cannot finish with only a city):
          - service_query unknown -> collect_fields next="ask" (ask which service). If the message names the service, it is known — skip this.
          - user_requirements unknown -> collect_fields next="ask" (ask what and when).
          - zip_code unknown AND address unknown -> collect_fields next="ask" (ask for the address or US ZIP code).
          - zip_code unknown AND address known AND zip_status empty -> resolve_zip(ENGLISH address). Do NOT ask; do NOT finish.
          - zip_code unknown AND zip_status set (a resolve already failed) -> collect_fields next="ask" (ask for a valid US ZIP or a more specific English address).
          - ANY contact field missing (submit_first_name, submit_last_name, submit_email, or submit_phone) -> collect_fields next="ask": in ONE question ask for ALL the still-missing contact fields together (first name, last name, email, and the contact phone number) and re-emit the contact fields you already know. NEVER finish while any of the four is missing.
          - everything known (5-digit zip_code AND submit_first_name AND submit_last_name AND submit_email AND submit_phone) -> collect_fields next="done", re-emitting ALL of service_query, user_requirements, zip_code, submit_first_name, submit_last_name, submit_email, submit_phone in this SAME call.
        next:
          ask: collect_request
          collect: collect_request
          done: verify_request
          error: error
        fallback: { invalidNext: error, exhaustedNext: error }

      verify_request:
        kind: action_contract
        id: verify_request
        description: Deterministically verify the collected request is complete (service_query, a resolved 5-digit zip_code, and all four contact fields) before leaving collection. No LLM, no navigation. Routes back to collect_request whenever anything is still missing, so the flow never reaches search without a ZIP (search_service requires a non-null zip_code) or opens quotes without the contact the pros need.
        next:
          ok: open_site
          collect: collect_request
        fallback: { invalidNext: collect, exhaustedNext: collect }

      open_site:
        kind: action_contract
        id: open_site
        description: Navigate to Thumbtack before searching. Idempotent — a no-op when already on the site. A cross-domain navigation is terminal in the SDK (it fires the nav and completes the call without a durable replay, since the owning site script unloads on the domain change); the planner then resumes this flow on thumbtack to run the search.
        inputSelector:
          - site
        next:
          search: search
          error: error
        fallback: { invalidNext: error, exhaustedNext: error }

      search:
        kind: action_contract
        id: search_service
        maxSelfSteps: 8
        description: Search Thumbtack for the collected service in the resolved ZIP. Single durable call — start_search fires the search and the command suspends across the results navigation, then resumes on the loaded page to read candidates (robust cross-nav durable; no LLM loop, no separate read phase).
        next:
          done: pick_quote
          read: search
          error: no_results
        fallback: { invalidNext: error, exhaustedNext: error }

      pick_quote:
        kind: action_contract
        id: pick_quote
        description: Deterministically pick the next candidate pro and advance quote_index (no LLM, no navigation).
        next:
          open: open_quote
          done: quotes_done
        fallback: { invalidNext: done, exhaustedNext: done }

      open_quote:
        kind: action_contract
        id: open_quote
        description: Navigate to the picked pro and open its "Request estimate" dialog (never submits or sends). Detect-page aware — skips the cross-nav when already on the pro, then opens the same-context request-flow overlay.
        next:
          open: answer_quote
          error: pick_quote
        fallback: { invalidNext: error, exhaustedNext: error }

      answer_quote:
        kind: action_contract
        id: answer_quote
        maxSelfSteps: 16
        description: Auto-answer the active request-flow step (auto mode answers from user_requirements and clicks Next/Continue/Skip), then self-loop to the next step; route to submit once only the final Submit remains. NEVER submits or sends. Deterministic — the answer/submit decision is computed from the tool result (no LLM).
        next:
          answer: answer_quote
          submit: submit_quote
          error: pick_quote
        fallback: { invalidNext: error, exhaustedNext: error }

      submit_quote:
        kind: action_contract
        id: submit_quote
        description: Click the final Submit on the active quote step with the collected contact details (first/last name, email, phone). Captures the Thumbtack popover or outcome that results (e.g. a validation error or a sign-in prompt).
        next:
          done: pick_quote
          error: pick_quote
        fallback: { invalidNext: done, exhaustedNext: done }

      quotes_done:
        kind: terminal
        respond: |-
          Reply in the user's language. Output ONLY a "Quote requests" section built VERBATIM from the
          quote_results value in the Flow state JSON: one line per pro a quote request was opened for,
          each carrying the pro's name, its service_id, and the outcome. When an outcome includes the
          exact text of a Thumbtack popover returned on Submit (a validation error or a sign-in prompt),
          reproduce that popover text exactly. State how many quotes were attempted (quote_count).
          The Submit used the collected contact details (name, email, phone). Do NOT include the searched pro list or any search results; output the quote
          outcomes only.

      no_results:
        kind: terminal
        respond: |-
          Reply in the user's language. No pros were found for the requested service at the given
          location, which usually means the ZIP code is invalid or unsupported. Ask the user to
          double-check it and provide a valid US ZIP code (or a more specific city and state).

      error:
        kind: terminal
        respond: 견적 요청에 필요한 정보를 수집하지 못했습니다. 다시 시도해 주세요.

  shopping:
    goal: Buy products for the user — clarify the shopping list (each product and quantity), then on the shopping site search for each item in turn and add it to the cart, and report what was added. Never place an order.
    contexts: [memory]
    inputSelector:
      - requestText
    state:
      site: amazon
      shop_plan: null
      shop_index: null
      query: null
      quantity: null
      candidates: null
      search_status: null
      product_id: null
      product_name: null
      add_status: null
      add_error: null
      shop_results: ""
      shop_count: null
    nodes:
      collect_shopping:
        kind: action_unit
        description: Build the shopping list — split the request into individual products, each with an English search query and a quantity; ask only if no product can be identified at all.
        model:
          providerID: openrouter
          modelID: openai/gpt-5.4-mini
          providerOptions:
            openrouter:
              provider: { sort: latency, allow_fallbacks: true }
              reasoning: { effort: medium }
        inputSelector:
          - requestText
          - shop_plan
        allowedTools: [collect_shopping]
        prompt: |-
          Build the shopping list, then finish. The current value is the projected shop_plan; ALSO extract products from the latest user message (requestText) and <memory>.

          SPLIT a multi-item request into SEPARATE items — "아이폰이랑 계란 사줘" / "buy an iPhone and eggs" becomes TWO items [iPhone, eggs], NEVER one combined query. Each item is an object { query, quantity }:
          - query: a SHORT English product search term for an online store. Translate to English ("아이폰" -> "iPhone", "계란" -> "eggs", "건전지" -> "batteries", "운동화" -> "running shoes"). Keep it broad enough to return results; do NOT demand brand/size/color unless the user already gave one.
          - quantity: an integer; DEFAULT to 1 whenever the user did not state a number. Never ask just to learn a quantity.

          One tool — collect_shopping:
          - collect_shopping(next, question?, shop_plan?): ALWAYS re-emit the FULL shop_plan you already know on every call — never drop an item. shop_plan is an ARRAY of { query, quantity }. next is "ask" or "done" ONLY; "ask" needs a `question` in the user's language.

          Make ONE tool call — the FIRST rule that applies:
          - NO product can be identified at all (the request names nothing concrete to buy) -> collect_shopping next="ask" with a question asking what to buy.
          - At least one product is identified -> collect_shopping next="done", emitting the full shop_plan (every item with an English query and an integer quantity, default 1).
        next:
          ask: collect_shopping
          done: open_amazon
          error: error
        fallback: { invalidNext: error, exhaustedNext: error }

      open_amazon:
        kind: action
        run: open_site
        inputSelector:
          - site
        next:
          search: next_product
          error: error
        fallback: { invalidNext: error, exhaustedNext: error }

      next_product:
        kind: action_contract
        id: next_product
        description: Record the item just processed and pick the next item from shop_plan (sets query/quantity, advances shop_index). No LLM, no navigation.
        next:
          shop: search_item
          done: shopping_done
        fallback: { invalidNext: done, exhaustedNext: done }

      search_item:
        kind: action_contract
        id: search_product
        description: Search the shopping site for the current item's query. Single durable call — fires the search, suspends across the results navigation, then resumes to read candidates.
        next:
          done: pick_item
          error: next_product
        fallback: { invalidNext: error, exhaustedNext: error }

      pick_item:
        kind: action_contract
        id: pick_product
        description: Deterministically pick the first usable search candidate (sets product_id/product_name). No LLM, no navigation.
        next:
          add: add_item
          skip: next_product
        fallback: { invalidNext: skip, exhaustedNext: skip }

      add_item:
        kind: action_contract
        id: add_to_cart
        description: Add the picked product to the cart with the requested quantity. Single durable call — navigates to the product page, clicks Add to Cart, declines the optional warranty, and reads the confirmation. Never places an order.
        next:
          done: next_product
          error: next_product
        fallback: { invalidNext: done, exhaustedNext: done }

      shopping_done:
        kind: terminal
        respond: |-
          Reply in the user's language. Output a short Cart summary built VERBATIM from the shop_results
          value in the Flow state JSON: one line per item — the product and whether it was added to the
          cart (with the reason when it was not). State how many items were processed (shop_count). Make
          clear the items are in the cart but NO order has been placed. Do NOT invent items, brands,
          quantities, or prices.

      error:
        kind: terminal
        respond: 무엇을 살지 확인하지 못했습니다. 구매할 품목을 다시 알려주세요.
flowTools:
  collect_fields:
    description: Fill the collected request fields and choose the next step (ask the user or finish).
    execute:
      kind: runtime
      implementation: passthrough
    output: tool.args
    parameters:
      type: object
      additionalProperties: true
      required: [next]
      properties:
        next: { type: string, enum: [ask, done] }
        question: { type: string }
        service_query: { type: string }
        user_requirements: { type: string }
        address: { type: string }
        zip_code: { type: string }
        zip_status: { type: string }
        submit_phone: { type: string }
        submit_email: { type: string }
        submit_first_name: { type: string }
        submit_last_name: { type: string }
        message: { type: string }

  collect_shopping:
    description: Fill the shopping list (shop_plan — an array of { query, quantity }) and choose the next step (ask the user to clarify, or finish).
    execute:
      kind: runtime
      implementation: passthrough
    output: tool.args
    parameters:
      type: object
      additionalProperties: true
      required: [next]
      properties:
        next: { type: string, enum: [ask, done] }
        question: { type: string }
        shop_plan:
          type: array
          items:
            type: object
            additionalProperties: true
            properties:
              query: { type: string }
              quantity: { type: [integer, number] }
        message: { type: string }

  next_product:
    description: Record the item just processed into shop_results and pick the next item from shop_plan (sets query/quantity, advances shop_index). No LLM, no navigation.
    execute:
      kind: runtime
      implementation: lua
      lua: |
        local plan = args.shop_plan or {}
        local idx = args.shop_index or 0
        local results = args.shop_results or ""
        local function nz(v) if v == nil or v == "" then return nil end return v end
        if idx > 0 then
          local prev = plan[idx] or {}
          local q = tostring(prev.query or "?")
          local qty = prev.quantity or 1
          local outcome
          if args.add_status == "added" then
            outcome = "added (x" .. tostring(qty) .. ")" .. (nz(args.product_name) and (" - " .. tostring(args.product_name)) or "")
          elseif args.add_status == "pending" then
            outcome = "add pending (x" .. tostring(qty) .. ")"
          elseif nz(args.add_error) then
            outcome = "NOT added (" .. tostring(args.add_error) .. ")"
          elseif not nz(args.product_id) then
            outcome = "no product found"
          else
            outcome = "skipped"
          end
          results = (results ~= "" and (results .. "\n") or "") .. q .. ": " .. outcome
        end
        if idx < #plan then
          local item = plan[idx + 1] or {}
          return {
            next = "shop",
            query = item.query,
            quantity = item.quantity or 1,
            shop_index = idx + 1,
            shop_results = results,
            search_status = "",
            product_id = "",
            product_name = "",
            add_status = "",
            add_error = "",
          }
        end
        return { next = "done", shop_index = idx, shop_results = results, shop_count = idx }
    parameters:
      type: object
      additionalProperties: true
      properties:
        shop_plan: { type: [array, "null"] }
        shop_index: { type: [integer, "null"] }
        shop_results: { type: [string, "null"] }
        product_id: { type: [string, "null"] }
        product_name: { type: [string, "null"] }
        add_status: { type: [string, "null"] }
        add_error: { type: [string, "null"] }

  search_product:
    description: Search the shopping site for the current item's query; returns candidate products.
    execute: { kind: remote, tool: AX_search_product, timeoutMs: 90000 }
    input:
      query: tool.args.query
    output:
      next: { if: [{ var: result.error }, "error", "done"] }
      candidates: result.candidates
      search_status: { if: [{ var: result.error }, { var: result.error }, "ok"] }
      error: result.error
    parameters:
      type: object
      additionalProperties: false
      required: [query]
      properties:
        query: { type: string }

  pick_product:
    description: Pick the first usable search candidate to add to the cart. No LLM, no navigation.
    execute:
      kind: runtime
      implementation: lua
      lua: |
        local cands = args.candidates or {}
        for i = 1, #cands do
          local c = cands[i] or {}
          local id = c.id
          if id ~= nil and id ~= "" then
            return { next = "add", product_id = id, product_name = c.name or c.title }
          end
        end
        return { next = "skip", product_id = "", product_name = "" }
    parameters:
      type: object
      additionalProperties: true
      properties:
        candidates: { type: [array, "null"] }

  add_to_cart:
    description: Add the picked product to the cart with the requested quantity. Navigates to the product page, clicks Add to Cart, declines optional warranty, reads the confirmation. Never places an order.
    execute: { kind: remote, tool: AX_add_to_cart, timeoutMs: 90000 }
    input:
      product_id: tool.args.product_id
      quantity: tool.args.quantity
    output:
      next: "done"
      add_status: { if: [{ var: result.added }, "added", { var: result.pending }, "pending", "failed"] }
      add_error: result.error
    parameters:
      type: object
      additionalProperties: false
      required: [product_id]
      properties:
        product_id: { type: string }
        quantity: { type: [integer, number, string] }

  verify_request:
    description: Check the collected request is complete — returns next=ok when service_query, zip_code, and all four contact fields (first/last name, email, phone) are present; otherwise next=collect to re-collect the missing field. Pure check; no navigation, no side effects.
    execute:
      kind: runtime
      implementation: lua
      lua: |
        local function nz(v) if v == nil or v == "" then return nil end return v end
        if nz(args.service_query) and nz(args.zip_code)
           and nz(args.submit_first_name) and nz(args.submit_last_name)
           and nz(args.submit_email) and nz(args.submit_phone) then
          return { next = "ok" }
        end
        return { next = "collect" }
    parameters:
      type: object
      additionalProperties: true
      properties:
        service_query: { type: [string, "null"] }
        zip_code: { type: [string, "null"] }
        submit_first_name: { type: [string, "null"] }
        submit_last_name: { type: [string, "null"] }
        submit_email: { type: [string, "null"] }
        submit_phone: { type: [string, "null"] }

  resolve_zip:
    description: Resolve a US ZIP code from an address string.
    execute: { kind: remote, tool: AX_resolve_zip }
    input:
      address: tool.args.address
    output:
      next: { if: [{ var: result.zip_code }, "collect", "ask"] }
      zip_code: result.zip_code
      zip_source: result.source
      zip_status: { if: [{ var: result.zip_code }, { var: result.status }, "resolve_failed"] }
      error: result.error
    parameters:
      type: object
      additionalProperties: false
      required: [address]
      properties:
        address: { type: string }

  open_site:
    description: Navigate to the target site's home page before searching. Site-keyed and idempotent — a no-op when already on the site; off-site it fires the navigation. A cross-domain navigation is terminal (no durable replay — the site script unloads on the domain change); the planner resumes the flow on the destination.
    execute: { kind: remote, tool: AX_open_site, timeoutMs: 60000 }
    input:
      site: tool.args.site
    output:
      next: { if: [{ var: result.error }, "error", "search"] }
      error: result.error
    parameters:
      type: object
      additionalProperties: false
      required: [site]
      properties:
        site: { type: string, enum: [thumbtack, amazon] }

  search_service:
    description: Search Thumbtack for local pros matching the service query in the resolved ZIP.
    execute: { kind: remote, tool: AX_search_service, timeoutMs: 90000 }
    input:
      query: tool.args.service_query
      zip_code: tool.args.zip_code
    output:
      next: { if: [{ "==": [{ var: result.status }, "completed"] }, "done", { var: result.error }, "error", "read"] }
      query: result.query
      search_status: result.status
      candidates: result.candidates
      total_count: result.total_count
      service_options: result.service_options
      error: result.error
    parameters:
      type: object
      additionalProperties: false
      required: [service_query, zip_code]
      properties:
        service_query: { type: string }
        zip_code: { type: string }

  pick_quote:
    description: Deterministically pick the next candidate pro to open and advance quote_index. No LLM, no navigation.
    execute:
      kind: runtime
      implementation: lua
      lua: |
        -- Projected from flow state (action_contract): candidate list, loop index, and the
        -- per-pro signals open_quote/answer_quote wrote for the pro we just finished.
        local cands = args.candidates or {}
        local idx = args.quote_index or 0    -- count of pros already opened (0-based)
        local MAX_OPEN = 6                    -- attempted = min(#candidates, MAX_OPEN). answer_quote's form self-loop is budgeted per-node via maxSelfSteps (exempt from global maxSteps), so each pro costs ~4 global flow steps (pick+open+answer-entry+submit); 6 pros fit maxSteps=64 with margin.
        -- quote_results is a newline-joined summary STRING (one line per pro). A string avoids
        -- the array/object serialization ambiguity an empty Lua table would hit at the schema.
        local results = args.quote_results or ""

        -- Record the pro we just finished (cands[idx], 1-based) before picking the next one.
        if idx > 0 then
          local prev = cands[idx] or {}
          local function nz(v) if v == nil or v == "" then return nil end return v end
          local open_err = nz(args.quote_error)
          local submit_status = nz(args.quote_submit_status)
          local submit_msg = nz(args.quote_submit_message)
          local submit_err = nz(args.quote_submit_error)
          local outcome
          if open_err then
            outcome = "FAILED to open/answer (" .. tostring(open_err) .. ")"
          elseif submit_msg then
            outcome = "Submitted -> Thumbtack error popover: \"" .. tostring(submit_msg) .. "\""
          elseif submit_status == "submitted" then
            outcome = "Submitted -> no error returned"
          elseif submit_status then
            outcome = "Submit attempted -> " .. tostring(submit_status) .. (submit_err and (" (" .. tostring(submit_err) .. ")") or "")
          elseif args.quote_reached_submit == true then
            outcome = "Reached final submit step (submit not attempted)"
          else
            outcome = "Stopped before submit (" .. tostring(args.quote_advance_reason or "no further auto-answer") .. ")"
          end
          local line = tostring(prev.name or "?") .. " [service_id " .. tostring(prev.service_id or "?") .. "]: " .. outcome
          results = (results ~= "" and (results .. "\n") or "") .. line
        end

        local limit = #cands
        if limit > MAX_OPEN then limit = MAX_OPEN end
        if idx < limit then
          local c = cands[idx + 1] or {}     -- Lua is 1-based; cands[idx+1] is the next unopened pro
          return {
            next = "open",
            quote_url = c.url,
            quote_target_service_id = c.service_id,
            quote_index = idx + 1,
            quote_results = results,
            -- clear per-pro signals so an open failure on the next pro can't inherit this result
            quote_error = "",
            quote_reached_submit = false,
            quote_answer_status = "",
            quote_status = "",
            quote_submit_status = "",
            quote_submit_message = "",
            quote_submit_error = "",
          }
        end
        return { next = "done", quote_index = idx, quote_results = results, quote_count = idx }
    parameters:
      type: object
      additionalProperties: true
      properties:
        candidates: { type: array }
        quote_index: { type: [integer, "null"] }
        quote_results: { type: [string, "null"] }
        quote_error: { type: [string, "null"] }
        quote_reached_submit: { type: [boolean, "null"] }
        quote_answer_status: { type: [string, "null"] }
        quote_status: { type: [string, "null"] }
        quote_advance_reason: { type: [string, "null"] }
        quote_submit_status: { type: [string, "null"] }
        quote_submit_message: { type: [string, "null"] }
        quote_submit_error: { type: [string, "null"] }

  open_quote:
    description: Navigate to the picked pro and open its "Request estimate" dialog. Never submits or sends.
    execute: { kind: remote, tool: AX_open_quote, timeoutMs: 60000 }
    input:
      url: tool.args.quote_url
      service_id: tool.args.quote_target_service_id
    output:
      next: { if: [{ var: result.error }, "error", "open"] }
      quote_status: result.status
      quote_service_id: result.service_id
      quote_error: result.error
    parameters:
      type: object
      additionalProperties: true
      properties:
        quote_url: { type: string }
        quote_target_service_id: { type: [string, "null"] }

  answer_quote:
    description: Answer the active Thumbtack request-flow step in auto mode and advance via Next/Continue/Skip. Never clicks Send/Submit/Get quotes; stops once the only remaining action is the final submit.
    execute: { kind: remote, tool: AX_answer_quote, timeoutMs: 60000 }
    input:
      auto: true
      user_requirements: tool.args.user_requirements
      email: tool.args.submit_email
      first_name: tool.args.submit_first_name
      last_name: tool.args.submit_last_name
      phone: tool.args.submit_phone
      zip_code: tool.args.zip_code
    output:
      next: { if: [{ var: result.error }, "error", { var: result.flow.reached_submit_step }, "submit", { "==": [{ var: result.flow.advance_reason }, "advance_button_not_found"] }, "submit", { "==": [{ var: result.flow.advance_reason }, "missing_answer"] }, "submit", "answer"] }
      quote_answer_status: result.status
      quote_advance_reason: result.flow.advance_reason
      quote_reached_submit: result.flow.reached_submit_step
      quote_error: result.error
    parameters:
      type: object
      additionalProperties: true
      properties:
        auto: { type: boolean }
        user_requirements: { type: [string, "null"] }
        submit_email: { type: [string, "null"] }
        submit_first_name: { type: [string, "null"] }
        submit_last_name: { type: [string, "null"] }
        submit_phone: { type: [string, "null"] }
        zip_code: { type: [string, "null"] }

  submit_quote:
    description: Click the final Submit on the active Thumbtack quote step with the collected contact details (first/last name, email, phone); returns the resulting Thumbtack popover/outcome text.
    execute: { kind: remote, tool: AX_submit_quote, timeoutMs: 60000 }
    input:
      confirm: true
      phone: tool.args.submit_phone
      email: tool.args.submit_email
      first_name: tool.args.submit_first_name
      last_name: tool.args.submit_last_name
      zip_code: tool.args.zip_code
    output:
      next: { if: [{ var: result.flow_error }, "done", "done"] }
      quote_submit_status: result.status
      quote_submit_message: { if: [{ var: result.message }, { var: result.message }, { var: result.request_error.message }] }
      quote_submit_error: result.flow_error
    parameters:
      type: object
      additionalProperties: true
      properties:
        zip_code: { type: [string, "null"] }
        submit_phone: { type: [string, "null"] }
        submit_email: { type: [string, "null"] }
        submit_first_name: { type: [string, "null"] }
        submit_last_name: { type: [string, "null"] }
